<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Camera Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            /* Draggable only when class is present */
            -webkit-app-region: no-drag;
        }

        body.draggable {
            -webkit-app-region: drag;
        }

        #camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Default shape handled by class */
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.8);
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Center crop */
            transform: scaleX(-1);
            /* Mirror effect */
        }

        /* Resize handle */
        #resize-handle {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.8);
            /* More visible */
            border-radius: 50%;
            cursor: nwse-resize;
            -webkit-app-region: no-drag;
            /* Allow clicking/dragging the handle */
            z-index: 1000;
            /* High z-index */
            opacity: 0;
            transition: opacity 0.2s;
        }

        body:hover #resize-handle {
            opacity: 1;
        }

        /* Shape classes */
        .shape-circle {
            border-radius: 50%;
        }

        .shape-square {
            border-radius: 12px;
        }

        /* Dynamic handle position based on shape */
        .shape-circle+#resize-handle {
            bottom: 15%;
            right: 15%;
        }

        .shape-square+#resize-handle {
            bottom: 5px;
            right: 5px;
        }
    </style>
</head>

<body>
    <div id="camera-container" class="shape-circle">
        <video id="camera-feed" autoplay muted playsinline></video>
    </div>
    <div id="resize-handle"></div>
    <script src="overlay.js"></script>
    <script>
        // Forward user input activity to main process
        const { ipcRenderer } = require('electron');

        let lastInputTime = 0;
        const THROTTLE_MS = 200; // Send at most every 200ms

        function sendInputActivity() {
            const now = Date.now();
            if (now - lastInputTime > THROTTLE_MS) {
                lastInputTime = now;
                // console.log('[Overlay] Detecting input, sending signal');
                ipcRenderer.send('overlay-user-input');
            }
        }

        window.addEventListener('mousemove', sendInputActivity);
        window.addEventListener('mousedown', () => {
            // Clicks should always send immediately
            ipcRenderer.send('overlay-user-input');
        });
        window.addEventListener('keydown', () => {
            ipcRenderer.send('overlay-user-input');
        });
    </script>
</body>

</html>
